<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pharmacy | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        secondary: '#10b981',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 antialiased selection:bg-primary selection:text-white">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <!-- Header -->
        <header class="mb-10 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-slate-900">Smart Pharmacy Dashboard</h1>
                <p class="mt-2 text-sm text-slate-500">Manage your inventory and monitor active stock levels.</p>
            </div>
            <div class="flex items-center gap-3">
                <span class="inline-flex h-3 w-3 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-sm font-medium text-slate-600">System Online</span>
            </div>
        </header>

        <!-- Status Message Container -->
        <div id="status-message" class="hidden mb-6 rounded-lg p-4 text-sm font-medium transition-all duration-300 transform translate-y-[-10px] opacity-0">
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Add Medicine Form -->
            <div class="lg:col-span-1">
                <div class="glass-panel shadow-xl shadow-slate-200/50 rounded-2xl border border-slate-100 p-6 sticky top-6">
                    <h2 class="text-xl font-semibold mb-6 flex items-center gap-2 text-slate-800">
                        <svg class="w-5 h-5 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                        </svg>
                        Add New Medicine
                    </h2>
                    
                    <form id="add-medicine-form" class="space-y-5">
                        <div>
                            <label for="name" class="block text-sm font-medium text-slate-700 mb-1">Medicine Name</label>
                            <input type="text" id="name" required
                                class="block w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm focus:border-primary focus:ring-primary focus:outline-none transition-shadow shadow-sm"
                                placeholder="e.g. Paracetamol 500mg">
                        </div>

                        <div>
                            <label for="description" class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                            <input type="text" id="description"
                                class="block w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm focus:border-primary focus:ring-primary focus:outline-none transition-shadow shadow-sm"
                                placeholder="Optional description">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="price" class="block text-sm font-medium text-slate-700 mb-1">Price ($)</label>
                                <input type="number" step="0.01" id="price" required
                                    class="block w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm focus:border-primary focus:ring-primary focus:outline-none transition-shadow shadow-sm"
                                    placeholder="0.00">
                            </div>
                            <div>
                                <label for="stock" class="block text-sm font-medium text-slate-700 mb-1">Stock Qty</label>
                                <input type="number" id="stock" required
                                    class="block w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm focus:border-primary focus:ring-primary focus:outline-none transition-shadow shadow-sm"
                                    placeholder="100">
                            </div>
                        </div>

                        <button type="submit" id="submit-btn"
                            class="mt-4 w-full flex justify-center items-center gap-2 rounded-lg bg-primary px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all active:scale-[0.98]">
                            <span>Add Medicine</span>
                            <!-- Loading Spinner (Hidden by default) -->
                            <svg id="submit-spinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Inventory Table -->
            <div class="lg:col-span-2">
                <div class="glass-panel shadow-xl shadow-slate-200/50 rounded-2xl border border-slate-100 overflow-hidden flex flex-col h-full min-h-[500px]">
                    <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-white/50">
                        <h2 class="text-lg font-semibold text-slate-800 flex items-center gap-2">
                            <svg class="w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                            </svg>
                            Current Inventory
                        </h2>
                        <button onclick="fetchMedicines()" class="text-sm text-primary hover:text-indigo-700 font-medium flex items-center gap-1 transition-colors">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                            Refresh
                        </button>
                    </div>
                    
                    <div class="overflow-x-auto grow relative">
                        <!-- Table Loading State -->
                        <div id="table-loading" class="absolute inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center z-10 transition-opacity duration-300">
                            <svg class="animate-spin h-8 w-8 text-primary mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <p class="text-sm font-medium text-slate-500">Loading inventory data...</p>
                        </div>

                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50/50 border-b border-slate-100 text-xs uppercase tracking-wider text-slate-500 font-semibold">
                                    <th class="px-6 py-4">ID</th>
                                    <th class="px-6 py-4">Name</th>
                                    <th class="px-6 py-4">Price</th>
                                    <th class="px-6 py-4">Stock</th>
                                    <th class="px-6 py-4">Status</th>
                                    <th class="px-6 py-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-tbody" class="divide-y divide-slate-100 bg-white/30 text-sm">
                                <!-- JavaScript populates rows here -->
                            </tbody>
                        </table>
                        
                        <!-- Empty State -->
                        <div id="empty-state" class="hidden flex-col items-center justify-center py-16 text-center">
                            <svg class="w-12 h-12 text-slate-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                            </svg>
                            <h3 class="text-sm font-medium text-slate-900">No medicines found</h3>
                            <p class="mt-1 text-sm text-slate-500">Get started by adding a new medicine to your inventory.</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000/api/v1';

        // DOM Elements
        const form = document.getElementById('add-medicine-form');
        const submitBtn = document.getElementById('submit-btn');
        const submitSpinner = document.getElementById('submit-spinner');
        const tbody = document.getElementById('inventory-tbody');
        const tableLoading = document.getElementById('table-loading');
        const emptyState = document.getElementById('empty-state');
        const statusMessage = document.getElementById('status-message');

        // Show toast notification
        function showMessage(msg, type = 'success') {
            statusMessage.textContent = msg;
            statusMessage.className = `mb-6 rounded-lg p-4 text-sm font-medium transition-all duration-300 transform translate-y-0 opacity-100 ${
                type === 'success' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-red-50 text-red-700 border border-red-200'
            }`;
            statusMessage.style.display = 'block';
            
            setTimeout(() => {
                statusMessage.classList.remove('translate-y-0', 'opacity-100');
                statusMessage.classList.add('translate-y-[-10px]', 'opacity-0');
                setTimeout(() => statusMessage.style.display = 'none', 300);
            }, 4000);
        }

        // Generate status badge based on stock level
        function getStatusBadge(stock) {
            if (stock === 0) return '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-800">Out of Stock</span>';
            if (stock < 20) return '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-yellow-100 text-yellow-800">Low Stock</span>';
            return '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-emerald-100 text-emerald-800">In Stock</span>';
        }

        let currentMedicines = [];
        let editMedicineId = null;

        // Fetch and display medicines
        async function fetchMedicines() {
            tableLoading.classList.remove('hidden');
            tableLoading.classList.add('flex');
            
            try {
                const response = await fetch(`${API_BASE_URL}/medicines`);
                if (!response.ok) throw new Error('Failed to fetch inventory');
                
                currentMedicines = await response.json();
                renderTable();
            } catch (error) {
                console.error(error);
                showMessage('We encountered an error loading the inventory. Please ensure the backend is running.', 'error');
            } finally {
                // Add slight delay for smoother transition
                setTimeout(() => {
                    tableLoading.classList.add('hidden');
                    tableLoading.classList.remove('flex');
                }, 300);
            }
        }

        function renderTable() {
            tbody.innerHTML = '';
            
            if (currentMedicines.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                currentMedicines.forEach(med => {
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-slate-50 transition-colors group';
                    
                    if (editMedicineId === med.id) {
                        tr.innerHTML = `
                            <td class="px-6 py-4 whitespace-nowrap text-slate-500 font-medium">#${med.id}</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex flex-col gap-1.5">
                                    <input type="text" id="edit-name-${med.id}" value="${med.name}" class="w-full rounded-md border border-slate-300 px-2 py-1 text-sm font-medium text-slate-900 focus:border-primary focus:ring-primary focus:outline-none" placeholder="Name">
                                    <input type="text" id="edit-desc-${med.id}" value="${med.description || ''}" class="w-full rounded-md border border-slate-300 px-2 py-1 text-xs text-slate-500 focus:border-primary focus:ring-primary focus:outline-none" placeholder="Description">
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-slate-700 font-medium">
                                <div class="flex items-center gap-1">
                                    <span class="text-slate-500">$</span>
                                    <input type="number" step="0.01" id="edit-price-${med.id}" value="${med.price}" class="w-24 rounded-md border border-slate-300 px-2 py-1 text-sm focus:border-primary focus:ring-primary focus:outline-none" placeholder="Price">
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-slate-700">
                                <input type="number" id="edit-stock-${med.id}" value="${med.stock_quantity}" class="w-20 rounded-md border border-slate-300 px-2 py-1 text-sm focus:border-primary focus:ring-primary focus:outline-none" placeholder="Stock">
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                ${getStatusBadge(med.stock_quantity)}
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                <button onclick="saveMedicine(${med.id})" class="text-emerald-600 hover:text-emerald-900 mr-3 transition-colors">Save</button>
                                <button onclick="cancelEdit()" class="text-slate-500 hover:text-slate-700 transition-colors">Cancel</button>
                            </td>
                        `;
                    } else {
                        tr.innerHTML = `
                            <td class="px-6 py-4 whitespace-nowrap text-slate-500 font-medium">#${med.id}</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="text-slate-900 font-medium">${med.name}</div>
                                ${med.description ? `<div class="text-slate-500 text-xs mt-0.5 truncate max-w-xs">${med.description}</div>` : ''}
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-slate-700 font-medium">$${med.price.toFixed(2)}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-slate-700">${med.stock_quantity}</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                ${getStatusBadge(med.stock_quantity)}
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                <button onclick="startEdit(${med.id})" class="text-primary hover:text-indigo-900 mr-3 transition-colors">Edit</button>
                                <button onclick="deleteMedicine(${med.id})" class="text-red-600 hover:text-red-900 transition-colors">Delete</button>
                            </td>
                        `;
                    }
                    tbody.appendChild(tr);
                });
            }
        }

        function startEdit(id) {
            editMedicineId = id;
            renderTable();
        }

        function cancelEdit() {
            editMedicineId = null;
            renderTable();
        }

        async function saveMedicine(id) {
            const name = document.getElementById(`edit-name-${id}`).value;
            const description = document.getElementById(`edit-desc-${id}`).value;
            const price = parseFloat(document.getElementById(`edit-price-${id}`).value);
            const stock_quantity = parseInt(document.getElementById(`edit-stock-${id}`).value);

            if (!name || isNaN(price) || isNaN(stock_quantity)) {
                showMessage('Please fill all required fields correctly.', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/medicines/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description, price, stock_quantity })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.detail || 'Failed to update medicine');
                }

                showMessage('Medicine updated successfully.');
                editMedicineId = null;
                fetchMedicines();
            } catch (error) {
                console.error(error);
                showMessage(`Error: ${error.message}`, 'error');
            }
        }

        // Delete medicine
        async function deleteMedicine(id) {
            if (!confirm('Are you sure you want to delete this medicine? This action cannot be undone.')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/medicines/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.detail || 'Failed to delete medicine');
                }

                showMessage('Medicine deleted successfully.');
                fetchMedicines();
            } catch (error) {
                console.error(error);
                showMessage(`Error: ${error.message}`, 'error');
            }
        }

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Set loading state
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-80', 'cursor-not-allowed');
            submitSpinner.classList.remove('hidden');
            
            const payload = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value || "",
                price: parseFloat(document.getElementById('price').value),
                stock_quantity: parseInt(document.getElementById('stock').value)
            };

            try {
                const response = await fetch(`${API_BASE_URL}/medicines`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.detail || 'Failed to add medicine');
                }

                // Reset form
                form.reset();
                showMessage(`Successfully added "${payload.name}" to inventory.`);
                
                // Refresh table
                fetchMedicines();
                
            } catch (error) {
                console.error(error);
                showMessage(`Error: ${error.message}`, 'error');
            } finally {
                // Revert loading state
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
                submitSpinner.classList.add('hidden');
            }
        });

        // Initial load
        document.addEventListener('DOMContentLoaded', fetchMedicines);
    </script>
</body>
</html>
